{% extends 'base.html' %}
{% block content %}
<h1>Площадки публикации</h1>
<section class="card form-card">
    <form method="post" class="inline-form">
        <input type="text" name="name" required placeholder="Название площадки">
        <input type="url" name="url" placeholder="Ссылка">
        <button class="btn primary" type="submit">Добавить</button>
    </form>
</section>

<section class="card">
<table>
    <thead><tr><th>Название</th><th>URL</th><th>Действия</th></tr></thead>
    <tbody>
        {% for platform in platforms %}
            <tr>
                <td>{{ platform.name }}</td>
                <td>{% if platform.url %}<a href="{{ platform.url }}" target="_blank">{{ platform.url }}</a>{% else %}-{% endif %}</td>
                <td>
                    <form method="post" action="{{ url_for('platform_delete', platform_id=platform.id) }}" onsubmit="return confirm('Удалить площадку?')">
                        <button class="btn danger small" type="submit">Удалить</button>
                    </form>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="3">Площадки пока не добавлены</td></tr>
        {% endfor %}
    </tbody>
</table>
</section>
{% endblock %}
